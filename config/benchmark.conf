# Default configuration for the EDHOC benchmark wrappers
# (build/initiator and build/responder).
#
# All values are env-style overrides. Setting a variable in the shell
# environment before invoking the wrapper still takes precedence.
#
# Tunables shared by initiator and responder (must match on both sides):
ITER=5             # full handshake iterations per section
CRYPTO_ITER=5      # per-operation crypto benchmark iterations
MTU=256            # EAP MTU (mode 2 & 3)
EAP_METHOD=57      # EAP method type (mode 2 & 3)

# Default base port (mode 1 uses BASE_PORT, mode 2 BASE_PORT+1, mode 3 BASE_PORT+2)
BASE_PORT=15000

# Default initiator target (loopback by default; override for two-host runs)
RESPONDER_IP=127.0.0.1

# Initiator-only:
START_DELAY=1      # seconds to wait for responder readiness per mode

# Responder-only:
AAA_PORT=3812      # FreeRADIUS auth port for mode 3
SKIP_FREERADIUS=0  # set to 1 to assume FreeRADIUS already running externally
